name: InfoMate CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering from GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Verify Neural Link
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Optimized Release APK
      run: ./gradlew assembleRelease

    - name: Prepare APK for Release
      run: |
        mkdir -p release-artifacts
        cp app/build/outputs/apk/release/app-release.apk release-artifacts/InfoMate-v9-FINAL-OPTIMIZED.apk

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: InfoMate-v9-FINAL-OPTIMIZED
        path: release-artifacts/InfoMate-v9-FINAL-OPTIMIZED.apk

    - name: Create GitHub Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v9.0-optimized-b${{ github.run_number }}
        name: InfoMate v9.0 - Final Optimized Build #${{ github.run_number }}
        body: |
          ### InfoMate v9.0 - Final Optimized Neural Link
          **Architect:** Socrates Kipruto
          
          This final optimized build includes:
          - **Master Architect Console:** Full system authority and resource monitoring.
          - **Deep Vector RAG:** Long-term memory retrieval integrated into the neural link.
          - **Invincible Edge Mode:** Automatic failover to on-device Gemini Nano when offline.
          - **Manual Knowledge Archiving:** Direct data entry into neural archives.
          - **Neural Stability Fix:** Resolved the EdgeBrain context interference.
          - **Haptic Tuning:** Refined tactile feedback patterns.
          
          **Download the optimized APK below.**
        files: release-artifacts/InfoMate-v9-FINAL-OPTIMIZED.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
