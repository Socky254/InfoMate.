name: InfoMate CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering from GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Verify Neural Link
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      actions: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Optimized Release APK
      run: ./gradlew assembleRelease
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    - name: Prepare APK for Release
      run: |
        mkdir -p release-artifacts
        cp app/build/outputs/apk/release/app-release.apk release-artifacts/InfoMate-v12.4-NEURAL-LINK.apk

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: InfoMate-v12.4-NEURAL-LINK
        path: release-artifacts/InfoMate-v12.4-NEURAL-LINK.apk

    - name: Create GitHub Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v12.4-b${{ github.run_number }}
        name: InfoMate v12.4 - Neural Link Build #${{ github.run_number }}
        body: |
          ### InfoMate v12.4 - Enhanced Neural Link
          **Architect:** Socrates Kipruto
          
          This v12.4 build includes:
          - **Optimized Startup:** Integrated App Startup library for faster neural awakening.
          - **Real-Time Telemetry:** Live synchronization with Ecosystem Growth metrics (GI, Stability, Entropy).
          - **Enhanced Consciousness:** Expanded knowledge domains and refined "Living UI" thought streams.
          - **High-Fidelity Visual Hub:** Upgraded "Iris" with rotating orbital rings and state-aware pulsing.
          - **Deterministic Growth:** Average GI and social scores now influence the global substrate.
          
          **Download the v12.4 APK below.**
        files: release-artifacts/InfoMate-v12.4-NEURAL-LINK.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
