name: InfoMate CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering from GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Verify Neural Link
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Prepare APK for Release
      run: |
        mkdir -p release-artifacts
        cp app/build/outputs/apk/debug/app-debug.apk release-artifacts/InfoMate-v9-STABLE.apk

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: InfoMate-v9-STABLE-APK
        path: release-artifacts/InfoMate-v9-STABLE.apk

    - name: Create GitHub Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v9.0-b${{ github.run_number }}
        name: InfoMate v9.0 - Stable Build #${{ github.run_number }}
        body: |
          ### InfoMate v9.0 - Stable Neural Link
          **Architect:** Socrates Kipruto
          
          This automated build contains the latest neural stability fixes:
          - **Hardened Ingestor:** Safe pattern extraction across Android versions.
          - **Stabilized Networking:** Exponential backoff for API reliability.
          - **Enterprise Diagnostics:** Real-time health monitoring enabled.
          
          **Download the APK below.**
        files: release-artifacts/InfoMate-v9-STABLE.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
