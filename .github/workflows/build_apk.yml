name: InfoMate CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Lint Analysis
      run: ./gradlew lintDebug

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: InfoMate-v9-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Build Release Bundle (AAB)
      run: ./gradlew bundleRelease

    - name: Upload Release Bundle
      uses: actions/upload-artifact@v4
      with:
        name: InfoMate-v9-Release-Bundle
        path: app/build/outputs/bundle/release/app-release.aab

    - name: Create GitHub Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v9.0-stable
        name: InfoMate v9.0 - Stable Neural Link
        body: |
          ### InfoMate v9.0 Stable Build
          
          This release includes major architectural upgrades:
          - **Neural Link Stability:** Jittered Backoff & Connection Pooling.
          - **Circuit Breaker:** Smart API rate limit handling.
          - **Enterprise Diagnostics:** Comprehensive health reporting.
          - **Resilient Observability:** Persistent health logs via Supabase.
          
          **Installation:** Download the `app-debug.apk` attached below.
        files: |
          app/build/outputs/apk/debug/app-debug.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
